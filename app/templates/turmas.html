<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acadêmico - Turmas</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .nav-link { color: white !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <a class="navbar-brand" href="/">Portal Acadêmico</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item active"><a class="nav-link" href="/turmas/">Turmas</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-success">Turmas (RF06)</h2>
        <a href="/admin/app/turma/add/" class="btn btn-success">Nova Turma</a>
    </div>

    <div class="table-responsive shadow-sm">
        <table class="table table-hover border">
            <thead class="thead-dark">
                <tr>
                    <th>Identificação da Turma</th>
                    <th>Curso Vinculado</th>
                    <th>Turno (RF11)</th>
                </tr>
            </thead>
            <tbody>
                {% for turma in turmas %}
                <tr>
                    <td class="font-weight-bold">{{ turma.nome }}</td>
                    <td>{{ turma.curso.nome }}</td>
                    <td>{{ turma.turno }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="text-center py-4">Nenhuma turma cadastrada.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="mt-4">
        <a href="/" class="btn btn-outline-secondary shadow-sm">
            Voltar para a Home
        </a>
    </div>
</div>

</body>
</html>
