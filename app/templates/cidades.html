<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acadêmico - Cidades</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>.nav-link { color: white !important; }</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <a class="navbar-brand" href="/">Portal Acadêmico</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item active"><a class="nav-link" href="/cidades/">Cidades</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-success">Cidades (RF12)</h2>
        <a href="/admin/app/cidade/add/" class="btn btn-success">Adicionar Cidade</a>
    </div>

    <div class="row">
        <div class="col-md-8 mx-auto">
            <table class="table table-hover border shadow-sm">
                <thead class="thead-dark">
                    <tr>
                        <th>Nome da Cidade</th>
                        <th class="text-center">UF</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cidade in cidades %}
                    <tr>
                        <td>{{ cidade.nome }}</td>
                        <td class="text-center"><span class="badge badge-secondary">{{ cidade.uf }}</span></td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="2" class="text-center py-4">Nenhuma cidade cadastrada.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4">
        <a href="/" class="btn btn-outline-secondary">Voltar para Home</a>
    </div>
</div>
</body>
</html>
