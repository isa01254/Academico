<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acadêmico - Disciplinas</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .nav-link { color: white !important; }
        .bg-success-custom { background-color: #28a745; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <a class="navbar-brand" href="/">Portal Acadêmico</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item active"><a class="nav-link" href="/disciplinas/">Disciplinas</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-success">Disciplinas (RF07)</h2>
        <a href="/admin/app/disciplina/add/" class="btn btn-success">Nova Disciplina</a>
    </div>

    <div class="table-responsive shadow-sm">
        <table class="table table-striped border">
            <thead class="bg-success-custom">
                <tr>
                    <th>Nome da Disciplina</th>
                    <th>Área do Saber</th>
                </tr>
            </thead>
            <tbody>
                {% for disciplina in disciplinas %}
                <tr>
                    <td>{{ disciplina.nome }}</td>
                    <td><span class="badge badge-info">{{ disciplina.area_saber.nome }}</span></td>
                </tr>
                {% empty %}
                <tr><td colspan="2" class="text-center py-4">Nenhuma disciplina cadastrada.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="mt-4">
        <a href="/" class="btn btn-outline-secondary shadow-sm">
            <i class="fas fa-arrow-left"></i> Voltar para o Início
        </a>
    </div>
</div>

</body>
</html>
